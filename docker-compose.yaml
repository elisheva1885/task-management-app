services:
  db:
    image: postgres:16
    container_name: postgres_container
    environment:
      POSTGRES_USER: task_managment_db_user
      POSTGRES_PASSWORD: task_managment_db_password
      POSTGRES_DB: task_managment_db
    ports:
      - '5433:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  db_data:
