# version: '3.8'
services:
  db:
    image: postgres:latest
    container_name: postgres_container
    env_file:
      - .env.stage.dev
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    ports: 
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql
volumes:
  db_data:



